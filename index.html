<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>15 Minutes of Torah — Pick Your Time</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C5973A;
      --gold-light: #FDF6E3;
      --gold-border: #E8D4A0;
      --navy: #1A2744;
      --navy-soft: #2C3E6B;
      --navy-light: #EEF1FA;
      --cream: #FBF7F0;
      --white: #FFFFFF;
      --border: #E5DDD0;
      --muted: #888078;
      --text: #1A1A1A;
      --period-bg: #F4F0EA;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--navy);
      color: white;
      padding: 22px 20px 20px;
      text-align: center;
    }
    header .hebrew { font-size: 18px; opacity: 0.55; letter-spacing: 3px; margin-bottom: 6px; }
    header h1 { font-size: 22px; font-weight: 700; }
    header p  { font-size: 13px; opacity: 0.65; margin-top: 4px; }

    /* ── Top controls ── */
    .top-bar {
      max-width: 100%;
      padding: 16px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .name-field {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .name-field label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      white-space: nowrap;
    }
    .name-field input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      font-family: inherit;
      background: transparent;
      color: var(--text);
    }
    .name-field input::placeholder { color: #CCC4B8; }

    .instructions {
      background: var(--gold-light);
      border: 1px solid var(--gold-border);
      border-radius: var(--radius);
      padding: 11px 14px;
      font-size: 13px;
      color: #6B4E1A;
      line-height: 1.5;
    }

    /* ── Calendar ── */
    .cal-wrapper {
      margin-top: 14px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }

    .cal-grid {
      display: flex;
      min-width: max-content;
      padding: 0 16px;
      gap: 8px;
      align-items: flex-start;
    }

    /* ── Day column ── */
    .day-col {
      width: 130px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .day-header {
      background: var(--navy);
      color: white;
      text-align: center;
      border-radius: 8px 8px 0 0;
      padding: 9px 0 8px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .day-header .abbr {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .day-header .full {
      font-size: 10px;
      opacity: 0.55;
      margin-top: 1px;
    }

    .day-body {
      border: 1.5px solid var(--border);
      border-top: none;
      border-radius: 0 0 8px 8px;
      overflow: hidden;
      background: var(--white);
    }

    /* ── Period section ── */
    .period-section { }

    .period-label {
      background: var(--period-bg);
      padding: 5px 10px;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .period-label .p-name { color: var(--navy); }

    /* ── Slot button ── */
    .slot {
      display: block;
      width: 100%;
      padding: 9px 10px;
      background: var(--white);
      border: none;
      border-bottom: 1px solid #F0EAE0;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s;
      position: relative;
    }
    .slot:last-child { border-bottom: none; }
    .slot:active { opacity: 0.75; }

    .slot-time {
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .slot-end {
      font-size: 10px;
      color: var(--muted);
      font-weight: 400;
      margin-top: 1px;
    }

    .slot-rank {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* Selected states */
    .slot[data-rank="1"] { background: var(--gold-light); }
    .slot[data-rank="1"] .slot-time { color: var(--gold); }
    .slot[data-rank="1"] .slot-rank { background: var(--gold); color: white; }

    .slot[data-rank="2"] { background: var(--navy-light); }
    .slot[data-rank="2"] .slot-time { color: var(--navy-soft); }
    .slot[data-rank="2"] .slot-rank { background: var(--navy-soft); color: white; }

    /* Period gap separator */
    .period-gap {
      height: 5px;
      background: var(--period-bg);
      border-bottom: 1px solid var(--border);
      border-top: 1px solid var(--border);
    }

    /* ── Submit bar ── */
    .submit-bar {
      padding: 14px 16px 28px;
      margin-top: 8px;
    }

    button#submit {
      width: 100%;
      padding: 15px;
      border-radius: var(--radius);
      border: none;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      background: var(--navy);
      color: white;
      transition: opacity 0.2s;
    }
    button#submit:disabled { opacity: 0.3; cursor: default; }

    .status-text {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 9px;
    }

    /* ── Success ── */
    #success {
      display: none;
      padding: 60px 24px 40px;
      text-align: center;
    }
    #success .menorah { font-size: 52px; margin-bottom: 16px; }
    #success h2 { font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
    #success .subtitle { font-size: 15px; color: var(--muted); line-height: 1.6; max-width: 280px; margin: 0 auto 24px; }

    .result-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      max-width: 320px;
      margin: 0 auto;
      overflow: hidden;
    }
    .result-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
    }
    .result-row + .result-row { border-top: 1px solid var(--border); }
    .result-rank {
      width: 28px; height: 28px; border-radius: 50%;
      font-size: 13px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .result-rank.r1 { background: var(--gold); color: white; }
    .result-rank.r2 { background: var(--navy-soft); color: white; }
    .result-label { font-size: 15px; font-weight: 700; }
    .result-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  </style>
</head>
<body>

<header>
  <div class="hebrew">טו דקות תורה</div>
  <h1>15 Minutes of Torah</h1>
  <p>Pick your two favorite times</p>
</header>

<div id="form-view">
  <div class="top-bar">
    <div class="name-field">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Your full name" autocomplete="name" />
    </div>
    <div class="instructions">
      Tap your <strong>1st choice</strong>, then your <strong>2nd choice</strong>. Swipe to see all days. Tap again to deselect.
    </div>
  </div>

  <div class="cal-wrapper">
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="submit-bar">
    <button id="submit" disabled>Submit</button>
    <div class="status-text" id="status-text">Select 2 times to continue</div>
  </div>
</div>

<div id="success">
  <div class="menorah">🕍</div>
  <h2>You're all set!</h2>
  <p class="subtitle">Rabbi Gray will reach out to confirm your weekly time.</p>
  <div class="result-card" id="result-card"></div>
</div>

<script>
// ─── Data ─────────────────────────────────────────────────────────────────────
const DAYS = [
  { id: 'mon', abbr: 'Mon', full: 'Monday', periods: [
    { name: '11',  s: [11,30], e: [12,35] },
    { name: '12',  s: [12,50], e: [13,55] },
    { name: '2',   s: [14,10], e: [15,15] },
    { name: '3A',  s: [15,30], e: [17,20] },
    { name: '6A',  s: [18,30], e: [20,20] },
  ]},
  { id: 'tue', abbr: 'Tue', full: 'Tuesday', periods: [
    { name: '2A',  s: [14,25], e: [16,15] },
    { name: '3B',  s: [16,30], e: [18,20] },
  ]},
  { id: 'wed', abbr: 'Wed', full: 'Wednesday', periods: [
    { name: '9L',  s: [8,50],  e: [9,55]  },
    { name: '10',  s: [10,10], e: [11,15] },
    { name: '11',  s: [11,30], e: [12,35] },
    { name: '12',  s: [12,50], e: [13,55] },
    { name: '2',   s: [14,10], e: [15,15] },
    { name: '3A',  s: [15,30], e: [17,20] },
    { name: '6B',  s: [19,30], e: [21,30] },
  ]},
  { id: 'thu', abbr: 'Thu', full: 'Thursday', periods: [
    { name: '9S',  s: [9,5],   e: [9,55]  },
    { name: '10A', s: [10,10], e: [12,0]  },
    { name: '2A',  s: [14,25], e: [16,15] },
    { name: '3B',  s: [16,30], e: [18,20] },
    { name: '6A',  s: [18,30], e: [20,20] },
  ]},
  { id: 'fri', abbr: 'Fri', full: 'Friday', periods: [
    { name: '9L',  s: [8,50],  e: [9,55]  },
    { name: '10',  s: [10,10], e: [11,15] },
    { name: '11',  s: [11,30], e: [12,35] },
    { name: '12',  s: [12,50], e: [13,55] },
  ]},
];

// ─── Helpers ──────────────────────────────────────────────────────────────────
function toMin(h, m) { return h * 60 + m; }

function fmt(h, m) {
  const suffix = h < 12 ? 'AM' : 'PM';
  const hh = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${hh}:${String(m).padStart(2,'0')} ${suffix}`;
}

function addMin(h, m, delta) {
  const total = h * 60 + m + delta;
  return [Math.floor(total / 60), total % 60];
}

// Generate 15-min slots with 5-min buffers within [sH:sM, eH:eM)
function getSlots(dayId, pName, sH, sM, eH, eM) {
  const slots = [];
  let h = sH, m = sM;
  const endMin = toMin(eH, eM);
  while (true) {
    const [eh, em] = addMin(h, m, 15);
    if (toMin(eh, em) > endMin) break;
    slots.push({ id: `${dayId}-${pName}-${h}-${String(m).padStart(2,'0')}`,
      day: dayId, period: pName,
      sH: h, sM: m, eH: eh, eM: em });
    [h, m] = addMin(h, m, 20); // 15 session + 5 buffer
  }
  return slots;
}

// ─── Build calendar ───────────────────────────────────────────────────────────
const calGrid = document.getElementById('cal-grid');

DAYS.forEach(day => {
  const col = document.createElement('div');
  col.className = 'day-col';

  // Header
  col.innerHTML = `
    <div class="day-header">
      <div class="abbr">${day.abbr}</div>
      <div class="full">${day.full}</div>
    </div>
    <div class="day-body" id="body-${day.id}"></div>
  `;
  calGrid.appendChild(col);

  const body = col.querySelector(`#body-${day.id}`);

  day.periods.forEach((period, pi) => {
    if (pi > 0) {
      const gap = document.createElement('div');
      gap.className = 'period-gap';
      body.appendChild(gap);
    }

    const section = document.createElement('div');
    section.className = 'period-section';

    const endLabel = fmt(...addMin(...period.e, -0)); // just display end time
    section.innerHTML = `
      <div class="period-label">
        <span class="p-name">Per ${period.name}</span>
        <span>${fmt(...period.s).replace(' AM','').replace(' PM','')}–${fmt(...period.e).replace(' AM','a').replace(' PM','p')}</span>
      </div>
    `;

    const slots = getSlots(day.id, period.name, ...period.s, ...period.e);
    slots.forEach(slot => {
      const btn = document.createElement('button');
      btn.className = 'slot';
      btn.dataset.id = slot.id;
      btn.dataset.day = day.full;
      btn.dataset.dayId = day.id;
      btn.dataset.period = slot.period;
      btn.dataset.sh = slot.sH;
      btn.dataset.sm = slot.sM;
      btn.dataset.eh = slot.eH;
      btn.dataset.em = slot.eM;
      btn.innerHTML = `
        <div class="slot-time">
          <span>${fmt(slot.sH, slot.sM)}</span>
          <div class="slot-rank"></div>
        </div>
        <div class="slot-end">ends ${fmt(slot.eH, slot.eM)}</div>
      `;
      btn.addEventListener('click', () => handleSelect(slot.id));
      section.appendChild(btn);
    });

    body.appendChild(section);
  });
});

// ─── Selection ────────────────────────────────────────────────────────────────
let choices = [null, null];

function handleSelect(id) {
  if (choices[0] === id) {
    choices[0] = choices[1];
    choices[1] = null;
  } else if (choices[1] === id) {
    choices[1] = null;
  } else if (!choices[0]) {
    choices[0] = id;
  } else if (!choices[1]) {
    choices[1] = id;
  } else {
    choices[1] = id;
  }
  render();
}

function render() {
  document.querySelectorAll('.slot').forEach(btn => {
    const id = btn.dataset.id;
    const rank = btn.querySelector('.slot-rank');
    if (choices[0] === id) {
      btn.dataset.rank = '1'; rank.textContent = '1';
    } else if (choices[1] === id) {
      btn.dataset.rank = '2'; rank.textContent = '2';
    } else {
      delete btn.dataset.rank; rank.textContent = '';
    }
  });

  const filled = choices.filter(Boolean).length;
  const hasName = document.getElementById('name').value.trim().length > 0;
  const submitBtn = document.getElementById('submit');
  const statusEl = document.getElementById('status-text');

  submitBtn.disabled = !(filled === 2 && hasName);
  if (filled === 0) statusEl.textContent = 'Select 2 times to continue';
  else if (filled === 1) statusEl.textContent = 'Select one more time';
  else if (!hasName) statusEl.textContent = 'Enter your name above';
  else statusEl.textContent = '✓ Ready to submit';
}

document.getElementById('name').addEventListener('input', render);

// ─── Submit ───────────────────────────────────────────────────────────────────
document.getElementById('submit').addEventListener('click', () => {
  const name = document.getElementById('name').value.trim();

  function slotInfo(id) {
    const el = document.querySelector(`.slot[data-id="${id}"]`);
    return {
      day: el.dataset.day,
      period: el.dataset.period,
      start: fmt(+el.dataset.sh, +el.dataset.sm),
      end:   fmt(+el.dataset.eh, +el.dataset.em),
    };
  }

  const first  = slotInfo(choices[0]);
  const second = slotInfo(choices[1]);

  const SUBMIT_URL = 'YOUR_APPS_SCRIPT_URL_HERE'; // ← paste your Apps Script URL here
  if (SUBMIT_URL !== 'YOUR_APPS_SCRIPT_URL_HERE') {
    fetch(SUBMIT_URL, { method: 'POST', body: JSON.stringify({ name, first, second }) })
      .catch(() => {}); // silent fail — success screen always shows
  }

  document.getElementById('form-view').style.display = 'none';
  const s = document.getElementById('success');
  s.style.display = 'block';

  document.getElementById('result-card').innerHTML = `
    <div class="result-row">
      <div class="result-rank r1">1</div>
      <div>
        <div class="result-label">${first.day} · Period ${first.period}</div>
        <div class="result-sub">${first.start} – ${first.end}</div>
      </div>
    </div>
    <div class="result-row">
      <div class="result-rank r2">2</div>
      <div>
        <div class="result-label">${second.day} · Period ${second.period}</div>
        <div class="result-sub">${second.start} – ${second.end}</div>
      </div>
    </div>
    <div class="result-row" style="justify-content:center;padding:10px 16px">
      <span style="font-size:13px;color:var(--muted)">Submitted for <strong>${name}</strong></span>
    </div>
  `;
});
</script>
</body>
</html>
