<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>15 Minutes of Torah — Pick Your Time</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C5973A;
      --gold-light: #FDF6E3;
      --gold-border: #E8D4A0;
      --navy: #1A2744;
      --navy-soft: #2C3E6B;
      --navy-light: #EEF1FA;
      --cream: #FBF7F0;
      --white: #FFFFFF;
      --border: #E5DDD0;
      --muted: #888078;
      --text: #1A1A1A;
      --period-bg: #F4F0EA;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--navy);
      color: white;
      padding: 22px 20px 20px;
      text-align: center;
    }
    header .hebrew { font-size: 18px; opacity: 0.55; letter-spacing: 3px; margin-bottom: 6px; }
    header h1 { font-size: 22px; font-weight: 700; }
    header p  { font-size: 13px; opacity: 0.65; margin-top: 4px; }

    /* ── Top controls ── */
    .top-bar {
      max-width: 100%;
      padding: 16px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .name-field {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .name-field label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      white-space: nowrap;
    }
    .name-field input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      font-family: inherit;
      background: transparent;
      color: var(--text);
    }
    .name-field input::placeholder { color: #CCC4B8; }

    .form-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .form-card label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    .form-card select {
      width: 100%;
      border: none;
      outline: none;
      font-size: 15px;
      font-family: inherit;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }
    .form-card select option { color: var(--text); }
    .form-card textarea {
      width: 100%;
      border: none;
      outline: none;
      font-size: 15px;
      font-family: inherit;
      background: transparent;
      color: var(--text);
      resize: none;
      line-height: 1.5;
    }
    .form-card textarea::placeholder { color: #CCC4B8; }

    .instructions {
      background: var(--gold-light);
      border: 1px solid var(--gold-border);
      border-radius: var(--radius);
      padding: 11px 14px;
      font-size: 13px;
      color: #6B4E1A;
      line-height: 1.5;
    }

    /* ── Calendar ── */
    .cal-wrapper {
      margin-top: 14px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }

    .cal-grid {
      display: flex;
      min-width: max-content;
      padding: 0 16px;
      gap: 8px;
      align-items: flex-start;
    }

    /* ── Day column ── */
    .day-col {
      width: 130px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .day-header {
      background: var(--navy);
      color: white;
      text-align: center;
      border-radius: 8px 8px 0 0;
      padding: 9px 0 8px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .day-header .abbr {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .day-header .full {
      font-size: 10px;
      opacity: 0.55;
      margin-top: 1px;
    }

    .day-body {
      border: 1.5px solid var(--border);
      border-top: none;
      border-radius: 0 0 8px 8px;
      overflow: hidden;
      background: var(--white);
    }

    /* ── Period section ── */
    .period-section { }

    .period-label {
      background: var(--period-bg);
      padding: 8px 10px 6px;
      font-size: 20px;
      font-weight: 800;
      color: var(--navy);
      border-bottom: 1px solid var(--border);
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* ── Slot button ── */
    .slot {
      display: block;
      width: 100%;
      padding: 9px 10px;
      background: var(--white);
      border: none;
      border-bottom: 1px solid #F0EAE0;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s;
      position: relative;
    }
    .slot:last-child { border-bottom: none; }
    .slot:active { opacity: 0.75; }

    .slot-time {
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .slot-end {
      font-size: 10px;
      color: var(--muted);
      font-weight: 400;
      margin-top: 1px;
    }

    .slot-rank {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* Selected states */
    .slot[data-rank="1"] { background: var(--gold-light); }
    .slot[data-rank="1"] .slot-time { color: var(--gold); }
    .slot[data-rank="1"] .slot-rank { background: var(--gold); color: white; }

    .slot[data-rank="2"] { background: var(--navy-light); }
    .slot[data-rank="2"] .slot-time { color: var(--navy-soft); }
    .slot[data-rank="2"] .slot-rank { background: var(--navy-soft); color: white; }

    .slot[data-rank="3"] { background: #F2F5EF; }
    .slot[data-rank="3"] .slot-time { color: #7A8A6A; }
    .slot[data-rank="3"] .slot-rank { background: #7A8A6A; color: white; }

    /* Period gap separator */
    .period-gap {
      height: 5px;
      background: var(--period-bg);
      border-bottom: 1px solid var(--border);
      border-top: 1px solid var(--border);
    }

    /* ── Submit bar ── */
    .submit-bar {
      padding: 14px 16px 28px;
      margin-top: 8px;
    }

    button#submit {
      width: 100%;
      padding: 15px;
      border-radius: var(--radius);
      border: none;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      background: var(--navy);
      color: white;
      transition: opacity 0.2s;
    }
    button#submit:disabled { opacity: 0.3; cursor: default; }

    .status-text {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 9px;
    }

    /* ── Success ── */
    #success {
      display: none;
      padding: 60px 24px 40px;
      text-align: center;
    }
    #success .menorah { font-size: 52px; margin-bottom: 16px; }
    #success h2 { font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
    #success .subtitle { font-size: 15px; color: var(--muted); line-height: 1.6; max-width: 280px; margin: 0 auto 24px; }

    .result-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      max-width: 320px;
      margin: 0 auto;
      overflow: hidden;
    }
    .result-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
    }
    .result-row + .result-row { border-top: 1px solid var(--border); }
    .result-rank {
      width: 28px; height: 28px; border-radius: 50%;
      font-size: 13px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .result-rank.r1 { background: var(--gold); color: white; }
    .result-rank.r2 { background: var(--navy-soft); color: white; }
    .result-rank.r3 { background: #7A8A6A; color: white; }
    .result-label { font-size: 15px; font-weight: 700; }
    .result-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  </style>
</head>
<body>

<header>
  <div class="hebrew">טו דקות תורה</div>
  <h1>15 Minutes of Torah</h1>
  <p>Pick your top 3 favorite times</p>
</header>

<div id="form-view">
  <div class="top-bar">
    <div class="name-field">
      <label for="firstname">First</label>
      <input type="text" id="firstname" placeholder="First name" autocomplete="given-name" />
    </div>
    <div class="name-field">
      <label for="lastname">Last</label>
      <input type="text" id="lastname" placeholder="Last name" autocomplete="family-name" />
    </div>
    <div class="instructions">
      Tap your <strong>1st</strong>, <strong>2nd</strong>, and <strong>3rd</strong> choice in order. Swipe to see all days. Tap again to deselect.
    </div>
  </div>

  <div class="cal-wrapper">
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div style="padding: 12px 16px 0;">
    <div class="form-card">
      <label for="notes">Notes for Rabbi Gray <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:#B0A898">(optional — if none of these times work, let him know here)</span></label>
      <textarea id="notes" rows="3" placeholder="e.g. I have a conflict most of the week this term, but…"></textarea>
    </div>
  </div>

  <div class="submit-bar">
    <button id="submit" disabled>Submit</button>
    <div class="status-text" id="status-text">Select 3 times to continue</div>
  </div>
</div>

<div id="success">
  <div class="menorah" id="success-icon">🕍</div>
  <h2 id="success-heading">Sending...</h2>
  <p class="subtitle" id="success-subtitle"></p>
  <div class="result-card" id="result-card"></div>
</div>

<script>
// ─── Data ─────────────────────────────────────────────────────────────────────
const DAYS = [
  { id: 'mon', abbr: 'Mon', full: 'Monday', periods: [
    { name: '11',  s: [11,30], e: [12,35] },
    { name: '12',  s: [12,50], e: [13,55] },
    { name: '2',   s: [14,10], e: [15,15] },
    { name: '3A',  s: [15,30], e: [17,0]  },
  ]},
  { id: 'tue', abbr: 'Tue', full: 'Tuesday', periods: [
    { name: '10A', s: [10,45], e: [12,0]  }, // blackout until 10:45
    { name: '2A',  s: [14,25], e: [16,15] },
    { name: '3B',  s: [16,30], e: [17,0]  },
  ]},
  { id: 'wed', abbr: 'Wed', full: 'Wednesday', periods: [
    { name: '9L',  s: [8,50],  e: [9,55]  },
    { name: '10',  s: [10,10], e: [11,15] },
    { name: '11',  s: [11,30], e: [12,35] },
    { name: '12',  s: [12,50], e: [13,55] },
    { name: '2',   s: [14,10], e: [15,15] },
    { name: '3A',  s: [15,30], e: [17,0]  },
  ]},
  { id: 'thu', abbr: 'Thu', full: 'Thursday', periods: [
    { name: '9S',  s: [9,5],   e: [9,55]  },
    { name: '10A', s: [10,10], e: [12,0]  },
    { name: '2A',  s: [14,25], e: [16,15] },
    { name: '3B',  s: [16,30], e: [17,0]  },
  ]},
  { id: 'fri', abbr: 'Fri', full: 'Friday', periods: [
    { name: '9L',  s: [8,50],  e: [9,55]  },
    { name: '10',  s: [10,10], e: [11,15] },
    { name: '11',  s: [11,30], e: [12,35] },
    { name: '12',  s: [12,50], e: [13,55] },
  ]},
];

// ─── Helpers ──────────────────────────────────────────────────────────────────
function toMin(h, m) { return h * 60 + m; }

function fmt(h, m) {
  const suffix = h < 12 ? 'AM' : 'PM';
  const hh = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${hh}:${String(m).padStart(2,'0')} ${suffix}`;
}

function addMin(h, m, delta) {
  const total = h * 60 + m + delta;
  return [Math.floor(total / 60), total % 60];
}

// Generate 15-min slots with 5-min buffers within [sH:sM, eH:eM)
function getSlots(dayId, pName, sH, sM, eH, eM) {
  const slots = [];
  let h = sH, m = sM;
  const endMin = toMin(eH, eM);
  while (true) {
    const [eh, em] = addMin(h, m, 15);
    if (toMin(eh, em) > endMin) break;
    slots.push({ id: `${dayId}-${pName}-${h}-${String(m).padStart(2,'0')}`,
      day: dayId, period: pName,
      sH: h, sM: m, eH: eh, eM: em });
    [h, m] = addMin(h, m, 20); // 15 session + 5 buffer
  }
  return slots;
}

// ─── Build calendar ───────────────────────────────────────────────────────────
const calGrid = document.getElementById('cal-grid');

DAYS.forEach(day => {
  const col = document.createElement('div');
  col.className = 'day-col';

  // Header
  col.innerHTML = `
    <div class="day-header">
      <div class="abbr">${day.abbr}</div>
      <div class="full">${day.full}</div>
    </div>
    <div class="day-body" id="body-${day.id}"></div>
  `;
  calGrid.appendChild(col);

  const body = col.querySelector(`#body-${day.id}`);

  day.periods.forEach((period, pi) => {
    if (pi > 0) {
      const gap = document.createElement('div');
      gap.className = 'period-gap';
      body.appendChild(gap);
    }

    const section = document.createElement('div');
    section.className = 'period-section';

    section.innerHTML = `<div class="period-label">${period.name}</div>`;

    const slots = getSlots(day.id, period.name, ...period.s, ...period.e);
    slots.forEach(slot => {
      const btn = document.createElement('button');
      btn.className = 'slot';
      btn.dataset.id = slot.id;
      btn.dataset.day = day.full;
      btn.dataset.dayId = day.id;
      btn.dataset.period = slot.period;
      btn.dataset.sh = slot.sH;
      btn.dataset.sm = slot.sM;
      btn.dataset.eh = slot.eH;
      btn.dataset.em = slot.eM;
      btn.innerHTML = `
        <div class="slot-time">
          <span>${fmt(slot.sH, slot.sM)}</span>
          <div class="slot-rank"></div>
        </div>
        <div class="slot-end">ends ${fmt(slot.eH, slot.eM)}</div>
      `;
      btn.addEventListener('click', () => handleSelect(slot.id));
      section.appendChild(btn);
    });

    body.appendChild(section);
  });
});

// ─── Selection ────────────────────────────────────────────────────────────────
let choices = [null, null, null];

function handleSelect(id) {
  const idx = choices.indexOf(id);
  if (idx !== -1) {
    // deselect: remove and shift remaining choices down
    choices.splice(idx, 1);
    choices.push(null);
  } else {
    const empty = choices.indexOf(null);
    if (empty !== -1) {
      choices[empty] = id;
    } else {
      choices[2] = id; // replace 3rd if all full
    }
  }
  render();
}

function render() {
  document.querySelectorAll('.slot').forEach(btn => {
    const id = btn.dataset.id;
    const rank = btn.querySelector('.slot-rank');
    const i = choices.indexOf(id);
    if (i !== -1) {
      btn.dataset.rank = String(i + 1);
      rank.textContent = String(i + 1);
    } else {
      delete btn.dataset.rank;
      rank.textContent = '';
    }
  });

  const filled = choices.filter(Boolean).length;
  const hasName = document.getElementById('firstname').value.trim().length > 0 && document.getElementById('lastname').value.trim().length > 0;
  const submitBtn = document.getElementById('submit');
  const statusEl = document.getElementById('status-text');

  submitBtn.disabled = !(filled === 3 && hasName);
  if (filled === 0) statusEl.textContent = 'Select 3 times to continue';
  else if (filled === 1) statusEl.textContent = '2 more to go';
  else if (filled === 2) statusEl.textContent = '1 more to go';
  else if (!hasName) statusEl.textContent = 'Enter your first and last name above';
  else statusEl.textContent = '✓ Ready to submit';
}

document.getElementById('firstname').addEventListener('input', render);
document.getElementById('lastname').addEventListener('input', render);

// ─── Submit ───────────────────────────────────────────────────────────────────
document.getElementById('submit').addEventListener('click', () => {
  const name  = document.getElementById('firstname').value.trim() + ' ' + document.getElementById('lastname').value.trim();
  const notes = document.getElementById('notes').value.trim();

  function slotInfo(id) {
    const el = document.querySelector(`.slot[data-id="${id}"]`);
    return {
      day: el.dataset.day,
      period: el.dataset.period,
      start: fmt(+el.dataset.sh, +el.dataset.sm),
      end:   fmt(+el.dataset.eh, +el.dataset.em),
    };
  }

  const [first, second, third] = choices.map(slotInfo);

  document.getElementById('form-view').style.display = 'none';
  const s = document.getElementById('success');
  s.style.display = 'block';

  const SUBMIT_URL = 'https://script.google.com/macros/s/AKfycbwMCs8pzvmOMdbZfO6uBZsr-dVUpC17Lr609PlbQUg6ZEpOaxpIG46Y--FfkwicrALW/exec';
  fetch(SUBMIT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, first, second, third, notes }) })
    .then(() => {
      document.getElementById('success-icon').textContent = '🕍';
      document.getElementById('success-heading').textContent = 'You\'re all set!';
      document.getElementById('success-subtitle').textContent = 'Rabbi Gray will reach out to confirm your weekly time.';
    })
    .catch(() => {
      document.getElementById('success-icon').textContent = '⚠️';
      document.getElementById('success-heading').textContent = 'Something went wrong';
      document.getElementById('success-subtitle').textContent = 'Your choices didn\'t go through. Please screenshot this and send it to Rabbi Gray directly.';
    });

  document.getElementById('result-card').innerHTML = `
    <div class="result-row">
      <div class="result-rank r1">1</div>
      <div>
        <div class="result-label">${first.day}, ${first.start}</div>
      </div>
    </div>
    <div class="result-row">
      <div class="result-rank r2">2</div>
      <div>
        <div class="result-label">${second.day}, ${second.start}</div>
      </div>
    </div>
    <div class="result-row">
      <div class="result-rank r3">3</div>
      <div>
        <div class="result-label">${third.day}, ${third.start}</div>
      </div>
    </div>
    ${notes ? `<div class="result-row"><div style="font-size:13px;color:var(--muted);line-height:1.5"><strong>Notes:</strong> ${notes}</div></div>` : ''}
    <div class="result-row" style="justify-content:center;padding:10px 16px">
      <span style="font-size:13px;color:var(--muted)">Submitted for <strong>${name}</strong></span>
    </div>
  `;
});
</script>
</body>
</html>
